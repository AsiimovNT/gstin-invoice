name: Build Windows .exe

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ─────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Cache pip ────────────────────────────────────────────
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      # ── 4. Install deps ─────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ── 5. Build EXE ────────────────────────────────────────────
      - name: Build with PyInstaller
        run: pyinstaller gstin_extractor.spec --clean --noconfirm

      # ── 6. DEBUG: check dist output ─────────────────────────────
      - name: Debug dist folder
        run: |
          echo "Contents of dist folder:"
          dir dist
        shell: pwsh

      # ── 7. Zip everything safely ────────────────────────────────
      - name: Zip dist folder
        run: |
          cd dist
          Compress-Archive -Path * -DestinationPath "..\GST_Invoice_Extractor_Windows.zip"
        shell: pwsh

      # ── 8. Upload artifact ──────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GST_Invoice_Extractor_Windows
          path: GST_Invoice_Extractor_Windows.zip
          retention-days: 30