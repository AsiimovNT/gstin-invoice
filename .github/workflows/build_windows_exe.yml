name: Build Windows .exe

# Trigger manually from GitHub UI (Actions tab → Run workflow)
# or automatically on every push to main
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest        # Real Windows machine in the cloud

    steps:
      # ── 1. Check out your code ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Cache pip packages (speeds up repeat builds) ───────────────────
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      # ── 4. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install streamlit pdfplumber openpyxl pandas altair pyinstaller

      # ── 5. Build the .exe with PyInstaller ─────────────────────────────────
      - name: Build with PyInstaller
        run: pyinstaller gstin_extractor.spec --clean --noconfirm

      # ── 6. Zip the output folder ───────────────────────────────────────────
      - name: Zip dist folder
        run: |
          cd dist
          Compress-Archive -Path "GST_Invoice_Extractor" -DestinationPath "..\GST_Invoice_Extractor_Windows.zip"
        shell: pwsh

      # ── 7. Upload as a downloadable artifact ──────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GST_Invoice_Extractor_Windows
          path: GST_Invoice_Extractor_Windows.zip
          retention-days: 30        # Available for 30 days after each build
